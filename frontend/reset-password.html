<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | CollegeOS</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/app.js"></script>
  </head>
  <body class="auth-page" data-page="reset-password">
    <main class="auth-shell">
      <section class="auth-brand">
        <a class="brand-link" href="login.html">CollegeOS</a>
        <h1>Set a new password and return to the dashboard.</h1>
        <p>Use the reset token from the generated demo link to create a fresh password.</p>
      </section>
      <section class="auth-card">
        <div class="panel-heading">
          <span class="eyebrow">Reset access</span>
          <h2>Create a new password</h2>
        </div>
        <form id="resetPasswordForm" class="stack-form">
          <label class="field">
            <span>Reset token</span>
            <input type="text" name="token" id="resetToken" placeholder="Paste reset token" required />
          </label>
          <label class="field">
            <span>New password</span>
            <input type="password" name="password" placeholder="At least 8 characters" required />
          </label>
          <label class="field">
            <span>Confirm password</span>
            <input type="password" name="confirmPassword" placeholder="Re-enter password" required />
          </label>
          <button class="button button-primary" type="submit">Reset Password</button>
        </form>
        <div id="resetPasswordMessage" class="inline-message hidden"></div>
        <div class="auth-links">
          <a href="login.html">Back to login</a>
        </div>
      </section>
    </main>
  </body>
</html>
